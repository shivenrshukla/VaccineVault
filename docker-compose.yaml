services:
  db:
    image: postgres:15-alpine
    container_name: vaccinevault_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ... redis service remains the same ...
  redis:
    image: redis:7-alpine
    container_name: vaccinevault_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: vaccinevault_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:5000"

volumes:
  postgres_data:
