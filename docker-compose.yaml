services:
  db:
    image: postgres:15-alpine
    container_name: vaccinevault_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-vaccinevault}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vaccinevault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaccinevault_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: vaccinevault_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be fully ready
      redis:
        condition: service_started
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - MAPMYINDIA_CLIENT_ID=${MAPMYINDIA_CLIENT_ID}
      - MAPMYINDIA_CLIENT_SECRET=${MAPMYINDIA_CLIENT_SECRET}
      - MAPMYINDIA_ACCESS_TOKEN=${MAPMYINDIA_ACCESS_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      # Add other environment variables (JWT_SECRET, mailer configs, etc.) here
    ports:
      - "5000:5000"

volumes:
  postgres_data: