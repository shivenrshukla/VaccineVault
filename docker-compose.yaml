services:
  db:
    image: postgres:15-alpine
    container_name: vaccinevault_db
    restart: always
    environment:
      # CHANGE THESE TO USE VARIABLES:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ... redis service remains the same ...
  redis:

    image: redis:7-alpine

    container_name: vaccinevault_redis

    restart: always

    ports:

      - "6379:6379"
  backend:
    build: ./backend
    container_name: vaccinevault_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      # ... keep the rest of your env vars ...
    ports:
      - "5000:5000"

volumes:
  postgres_data: